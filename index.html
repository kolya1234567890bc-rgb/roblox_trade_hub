<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HUB - TRADE SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #ff2e63; --green: #2ecc71; --text: #f8fafc; --gray: #64748b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; margin: 0; padding-bottom: 80px; }

        /* --- UI ELEMENTS --- */
        .card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #334155; position: relative; }
        input, textarea { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #444; border-radius: 10px; color: #fff; margin-bottom: 10px; font-family: inherit; }
        .btn { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 10px; color: #fff; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .btn-green { background: var(--green); }
        .btn-sm { padding: 8px 12px; font-size: 0.75rem; width: auto; display: inline-block; margin: 5px 2px; }
        
        header { background: var(--card); padding: 15px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 900; color: var(--accent); letter-spacing: 1px; }

        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .view { display: none; }
        .active { display: block; }

        /* --- TRADE NOTIFICATIONS --- */
        .chat-item { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 8px; border-left: 4px solid var(--gray); cursor: pointer; }
        .chat-item.pending { border-left-color: #f1c40f; background: rgba(241, 196, 15, 0.05); }
        .chat-item.active-chat { border-left-color: var(--green); }

        /* --- CHAT BOX --- */
        #chat-window { display: none; flex-direction: column; height: 75vh; }
        #msgs { flex-grow: 1; overflow-y: auto; padding: 10px 0; display: flex; flex-direction: column; gap: 10px; }
        .m { padding: 10px 14px; border-radius: 15px; max-width: 80%; font-size: 0.9rem; }
        .m.me { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 2px; }
        .m.them { align-self: flex-start; background: #334155; border-bottom-left-radius: 2px; }

        nav { position: fixed; bottom: 0; width: 100%; background: #1e293b; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #334155; }
        .nav-btn { background: none; border: none; color: var(--gray); font-weight: 900; font-size: 0.7rem; cursor: pointer; }
        .nav-btn.active { color: var(--accent); }
    </style>
</head>
<body>

<header>
    <div class="logo">TRADE HUB</div>
    <div id="u-name" style="font-size: 0.75rem; opacity: 0.7;"></div>
</header>

<div class="container">
    <div id="v-feed" class="view active">
        <h3>➕ Создать трейд</h3>
        <div class="card">
            <input type="text" id="t-title" placeholder="Что меняешь?">
            <textarea id="t-desc" rows="2" placeholder="На что хочешь обменять?"></textarea>
            <button class="btn" onclick="app.createPost()">ВЫСТАВИТЬ</button>
        </div>
        <hr style="opacity: 0.1; margin: 20px 0;">
        <div id="posts-list"></div>
    </div>

    <div id="v-chats" class="view">
        <h3>📩 Входящие и чаты</h3>
        <div id="chats-list"></div>

        <div id="chat-window">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 10px;">
                <button class="btn btn-sm" onclick="app.closeChat()">← Назад</button>
                <b id="chat-target">Чат</b>
            </div>
            <div id="msgs"></div>
            <div style="display: flex; gap: 5px; padding-top: 10px;">
                <input type="text" id="m-input" placeholder="Напиши сообщение..." style="margin:0">
                <button class="btn" style="width: 60px;" onclick="app.sendMsg()">></button>
            </div>
        </div>
    </div>

    <div id="v-profile" class="view">
        <div class="card" style="text-align: center;">
            <div style="font-size: 3rem; margin-bottom: 10px;">👤</div>
            <h2 id="p-name">Игрок</h2>
            <input type="text" id="new-name" placeholder="Новый ник">
            <button class="btn" onclick="app.changeName()">ОБНОВИТЬ НИК</button>
        </div>
    </div>
</div>

<nav>
    <button class="nav-btn active" onclick="app.tab('v-feed', this)">МАРКЕТ</button>
    <button class="nav-btn" onclick="app.tab('v-chats', this)">ТРЕЙДЫ</button>
    <button class="nav-btn" onclick="app.tab('v-profile', this)">ПРОФИЛЬ</button>
</nav>

<script>
const app = {
    user: localStorage.getItem('tr_user') || 'User' + Math.floor(Math.random()*999),
    posts: JSON.parse(localStorage.getItem('tr_posts') || '[]'),
    chats: JSON.parse(localStorage.getItem('tr_chats') || '[]'),
    activeChat: null,

    init() {
        this.render();
    },

    createPost() {
        const title = document.getElementById('t-title').value.trim();
        const desc = document.getElementById('t-desc').value.trim();
        if(!title || !desc) return;
        
        this.posts.unshift({ id: Date.now(), owner: this.user, title, desc });
        localStorage.setItem('tr_posts', JSON.stringify(this.posts));
        document.getElementById('t-title').value = '';
        document.getElementById('t-desc').value = '';
        this.render();
    },

    // 1. Игрок А нажимает "Предложить трейд"
    sendTradeRequest(postOwner, postTitle) {
        if(postOwner === this.user) return alert("Это твой пост!");
        
        const chatId = 'ch_' + Date.now();
        this.chats.unshift({
            id: chatId,
            from: this.user,
            to: postOwner,
            topic: postTitle,
            status: 'pending', // Статус ожидания
            msgs: []
        });
        
        localStorage.setItem('tr_chats', JSON.stringify(this.chats));
        alert("Запрос отправлен! Жди, пока владелец примет его.");
        this.tab('v-chats', document.querySelectorAll('.nav-btn')[1]);
    },

    // 2. Игрок Б нажимает "Принять"
    acceptTrade(chatId) {
        const chat = this.chats.find(c => c.id === chatId);
        chat.status = 'accepted';
        chat.msgs.push({ sender: 'SYSTEM', text: 'Трейд принят! Теперь вы можете общаться.' });
        localStorage.setItem('tr_chats', JSON.stringify(this.chats));
        this.render();
    },

    rejectTrade(chatId) {
        this.chats = this.chats.filter(c => c.id !== chatId);
        localStorage.setItem('tr_chats', JSON.stringify(this.chats));
        this.render();
    },

    openChat(chatId) {
        const chat = this.chats.find(c => c.id === chatId);
        if(chat.status === 'pending' && chat.to === this.user) return; // Не открывать чат, пока не принят
        this.activeChat = chat;
        this.renderChatWindow();
    },

    sendMsg() {
        const text = document.getElementById('m-input').value.trim();
        if(!text || !this.activeChat) return;
        
        this.activeChat.msgs.push({ sender: this.user, text: text });
        localStorage.setItem('tr_chats', JSON.stringify(this.chats));
        document.getElementById('m-input').value = '';
        this.renderChatWindow();
    },

    renderChatWindow() {
        document.getElementById('chats-list').style.display = 'none';
        document.getElementById('chat-window').style.display = 'flex';
        document.getElementById('chat-target').innerText = this.activeChat.topic;
        
        const box = document.getElementById('msgs');
        box.innerHTML = this.activeChat.msgs.map(m => `
            <div class="m ${m.sender === this.user ? 'me' : 'them'}">
                <small style="font-size:0.6rem; display:block; opacity:0.6">${m.sender}</small>
                ${m.text}
            </div>
        `).join('');
        box.scrollTop = box.scrollHeight;
    },

    closeChat() {
        this.activeChat = null;
        document.getElementById('chat-window').style.display = 'none';
        document.getElementById('chats-list').style.display = 'block';
        this.render();
    },

    tab(id, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if(id !== 'v-chats') this.activeChat = null;
    },

    changeName() {
        const n = document.getElementById('new-name').value.trim();
        if(n) { this.user = n; localStorage.setItem('tr_user', n); this.render(); }
    },

    render() {
        document.getElementById('u-name').innerText = "@" + this.user;
        document.getElementById('p-name').innerText = this.user;

        // Рендер постов
        document.getElementById('posts-list').innerHTML = this.posts.map(p => `
            <div class="card">
                <b style="color:var(--accent)">@${p.owner}</b>
                <div style="font-size:1.1rem; font-weight:900; margin:5px 0;">${p.title}</div>
                <div style="font-size:0.85rem; opacity:0.8">${p.desc}</div>
                ${p.owner !== this.user ? 
                    `<button class="btn btn-sm" onclick="app.sendTradeRequest('${p.owner}', '${p.title}')">🤝 ПРЕДЛОЖИТЬ ТРЕЙД</button>` 
                    : `<span style="font-size:0.7rem; color:var(--gray)">Ваш пост</span>`}
            </div>
        `).join('');

        // Рендер чатов и запросов
        document.getElementById('chats-list').innerHTML = this.chats.map(c => {
            const isOwner = c.to === this.user;
            const otherUser = isOwner ? c.from : c.to;
            
            if(c.status === 'pending') {
                return `
                    <div class="chat-item pending">
                        <b>Запрос от ${c.from}</b><br>
                        <small>Тема: ${c.topic}</small><br>
                        ${isOwner ? `
                            <button class="btn btn-sm btn-green" onclick="app.acceptTrade('${c.id}')">ПРИНЯТЬ</button>
                            <button class="btn btn-sm" style="background:#444" onclick="app.rejectTrade('${c.id}')">ОТКЛОНИТЬ</button>
                        ` : `<p style="font-size:0.7rem; color:#f1c40f">Ожидание подтверждения...</p>`}
                    </div>
                `;
            } else {
                return `
                    <div class="chat-item active-chat" onclick="app.openChat('${c.id}')">
                        <b>Чат с ${otherUser}</b> — <small>${c.topic}</small>
                        <div style="font-size:0.7rem; color:var(--green)">✓ Сделка открыта</div>
                    </div>
                `;
            }
        }).join('');
    }
};

app.init();
</script>
</body>
</html>
